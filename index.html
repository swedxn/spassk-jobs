<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f7" />
    <meta name="description" content="Актуальные вакансии только в Спасске-Дальнем — поиск, подбор и личный трекер откликов." />
    <script>
      try {
        const saved = localStorage.getItem('spassk-jobs-theme-v1');
        const theme = saved === 'light' || saved === 'dark' ? saved : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      } catch {}
    </script>
    <title>Работа в Спасске-Дальнем</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
