name: Update vacancies and deploy
on:
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm test
      - run: npm run import
      - name: Save updated cloud data
        run: |
          git config user.name "spassk-jobs-bot"
          git config user.email "spassk-jobs-bot@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "data: update vacancies"
          git push
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - uses: actions/deploy-pages@v4
        id: deployment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
